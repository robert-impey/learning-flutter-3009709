pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, 'local.properties')
        if (propertiesFile.exists()) {
            propertiesFile.withReader('UTF-8') { reader -> properties.load(reader) }
        }
        def sdkPath = properties.getProperty('flutter.sdk')
        assert sdkPath != null, "Flutter SDK not found. Define location with flutter.sdk in the local.properties file."
        return sdkPath
    }()

    includeBuild "${flutterSdkPath}/packages/flutter_tools/gradle"

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    // Upgraded to clear Flutter's toolchain deprecation warnings
    id "com.android.application" version "8.11.1" apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"